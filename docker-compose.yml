services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "iln"
    volumes:
      - db:/var/lib/postgresql/data
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    depends_on:
      - db
    environment:
      DB_HOST: db
  nginx:
    image: nginx:1.25
    ports:
      - "4040:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
  frontend:
    build: ./frontend
    ports:
      - "3002:80"
volumes:
  db:
