name: CI/CD
on:
  push:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: docker test
        run: docker --version
      - name: start
        run: docker compose build
      - name: containers
        run: docker compose up -d




